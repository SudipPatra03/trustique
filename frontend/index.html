<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Trustique — Secure encrypted messaging with blockchain verification">
  <meta name="theme-color" content="#0f8b68">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Trustique — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Page background design blobs -->
  <div class="auth-bg-blob blob-1"></div>
  <div class="auth-bg-blob blob-2"></div>
  <div class="auth-bg-blob blob-3"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      
      <!-- Left Split Panel: Gradient & Branding -->
      <div class="auth-card-left">
        <div class="brand-container">
          <div class="brand-logo">
            <img src="logo.png" alt="Trustique Logo">
          </div>
          <h1 class="brand-name">Trustique</h1>
        </div>
        <hr class="brand-divider">
        <p class="brand-description">
          Secure, end-to-end encrypted messaging with blockchain-powered integrity verification.
        </p>
      </div>

      <!-- Right Split Panel: Forms & Interaction -->
      <div class="auth-card-right">
        
        <!-- Header tab switcher (top right aligned) -->
        <div class="auth-tabs-container">
          <div class="auth-tabs" id="authTabs">
            <button class="auth-tab" data-tab="register" id="registerTab">SIGN UP</button>
            <button class="auth-tab active" data-tab="login" id="loginTab">LOGIN</button>
          </div>
        </div>

        <!-- Alert messages container -->
        <div class="auth-message" id="authMessage"></div>

        <!-- Login Form -->
        <form class="auth-form active" id="loginForm">
          <div class="form-group">
            <label for="loginEmail">EMAIL</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
          </div>
          <div class="form-group">
            <label for="loginPassword">PASSWORD</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <button type="button" class="password-toggle-btn" data-target="loginPassword" aria-label="Toggle password visibility">
              <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          
          <div class="auth-options-row">
            <button type="button" class="auth-link" id="forgotPasswordLink">Forgot Password?</button>
          </div>

          <button type="submit" class="btn btn-primary" id="loginBtn">
            <span>SIGN IN</span>
          </button>
        </form>

        <!-- Register Form (Sign Up) -->
        <form class="auth-form" id="registerForm">
          <div class="form-group">
            <label for="regName">FULL NAME</label>
            <input type="text" id="regName" placeholder="John Doe" required autocomplete="name">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          </div>
          
          <div class="form-group">
            <label for="regUserId">USER ID</label>
            <input type="text" id="regUserId" placeholder="john_doe123" autocomplete="username">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-4 8"/></svg></span>
          </div>

          <div class="form-group">
            <label for="regEmail">EMAIL</label>
            <input type="email" id="regEmail" placeholder="you@example.com" required autocomplete="email">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
          </div>

          <!-- Inline Password / Confirm Password fields -->
          <div class="form-row-inline">
            <div class="form-group inline-field">
              <label for="regPassword">Password</label>
              <input type="password" id="regPassword" placeholder="••••••••" required minlength="6" autocomplete="new-password">
              <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
              <button type="button" class="password-toggle-btn" data-target="regPassword" aria-label="Toggle password visibility">
                <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <div class="form-group inline-field">
              <label for="regConfirmPassword">Confirm Password</label>
              <input type="password" id="regConfirmPassword" placeholder="••••••••" required minlength="6" autocomplete="new-password">
              <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
              <button type="button" class="password-toggle-btn" data-target="regConfirmPassword" aria-label="Toggle password visibility">
                <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <!-- Terms acceptance -->
          <div class="form-checkbox-row">
            <label class="checkbox-container">
              <input type="checkbox" id="regTerms" required>
              <span class="checkmark"></span>
              I have accepted the terms and conditions
            </label>
          </div>

          <button type="submit" class="btn btn-primary" id="regBtn">
            <span>SIGN UP</span>
          </button>
        </form>

        <!-- OTP Verification Form -->
        <form class="auth-form" id="otpForm">
          <div class="otp-header">
            <div class="otp-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></div>
            <h2>Verify Your Email</h2>
            <p>We've sent a 6-digit code to <strong id="otpEmailDisplay"></strong></p>
          </div>
          <div class="form-group">
            <label for="otpInput">ENTER OTP CODE</label>
            <div class="otp-input-group">
              <input type="text" id="otpInput" placeholder="000000" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code" required>
              <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></span>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="verifyOtpBtn">
            <span>VERIFY EMAIL</span>
          </button>
          <div class="auth-link-row">
            <button type="button" class="auth-link" id="resendOtpLink">Didn't receive the code? <strong>Resend OTP</strong></button>
          </div>
          <div class="auth-link-row">
            <button type="button" class="auth-link" id="backToLoginFromOtp">&larr; Back to Login</button>
          </div>
        </form>

        <!-- Forgot Password Form -->
        <form class="auth-form" id="forgotForm">
          <div class="otp-header">
            <div class="otp-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg></div>
            <h2>Forgot Password</h2>
            <p>Enter your email and we'll send you a reset code</p>
          </div>
          <div class="form-group">
            <label for="forgotEmail">EMAIL</label>
            <input type="email" id="forgotEmail" placeholder="you@example.com" required autocomplete="email">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
          </div>
          <button type="submit" class="btn btn-primary" id="forgotBtn">
            <span>SEND RESET CODE</span>
          </button>
          <div class="auth-link-row">
            <button type="button" class="auth-link" id="backToLoginFromForgot">&larr; Back to Login</button>
          </div>
        </form>

        <!-- Reset Password Form -->
        <form class="auth-form" id="resetForm">
          <div class="otp-header">
            <div class="otp-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg></div>
            <h2>Reset Password</h2>
            <p>Enter the code sent to <strong id="resetEmailDisplay"></strong></p>
          </div>
          <div class="form-group">
            <label for="resetOtp">OTP CODE</label>
            <input type="text" id="resetOtp" placeholder="000000" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code" required>
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></span>
          </div>
          <div class="form-group">
            <label for="resetNewPassword">NEW PASSWORD</label>
            <input type="password" id="resetNewPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <button type="button" class="password-toggle-btn" data-target="resetNewPassword" aria-label="Toggle password visibility">
              <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <div class="form-group">
            <label for="resetConfirmPassword">CONFIRM PASSWORD</label>
            <input type="password" id="resetConfirmPassword" placeholder="Confirm new password" required minlength="6" autocomplete="new-password">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <button type="button" class="password-toggle-btn" data-target="resetConfirmPassword" aria-label="Toggle password visibility">
              <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <button type="submit" class="btn btn-primary" id="resetBtn">
            <span>RESET PASSWORD</span>
          </button>
          <div class="auth-link-row">
            <button type="button" class="auth-link" id="backToLoginFromReset">&larr; Back to Login</button>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
